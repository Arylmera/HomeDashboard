# ─────────────────────────────────────────────────────────────
#  GitLab CI — build & push Docker image to GitLab Registry
#
#  Image tags pushed:
#    $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA   (every build)
#    $CI_REGISTRY_IMAGE:<branch-or-tag>        (slug)
#    $CI_REGISTRY_IMAGE:latest                 (default branch only)
#
#  Build-time public vars (VITE_*_URL) come from CI/CD variables —
#  set them in: Settings → CI/CD → Variables. Mark URLs as "masked"
#  if you want; keep them "Protected" if only built on main.
#
#  Runtime secrets (TRUENAS_API_KEY, PLEX_TOKEN, …) are NOT baked
#  into the image. Inject them on your NAS via `docker run -e …`
#  or compose `environment:` / `env_file:`.
# ─────────────────────────────────────────────────────────────

stages:
  - build

variables:
  DOCKER_BUILDKIT: "1"

build:image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - |
      TAG_SHA="$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      TAG_REF="$CI_REGISTRY_IMAGE:${CI_COMMIT_REF_SLUG}"
      EXTRA_TAG=""
      if [ "$CI_COMMIT_REF_NAME" = "$CI_DEFAULT_BRANCH" ]; then
        EXTRA_TAG="-t $CI_REGISTRY_IMAGE:latest"
      fi
      docker build \
        --build-arg VITE_TRUENAS_URL="$VITE_TRUENAS_URL" \
        --build-arg VITE_PLEX_URL="$VITE_PLEX_URL" \
        --build-arg VITE_SONARR_URL="$VITE_SONARR_URL" \
        --build-arg VITE_RADARR_URL="$VITE_RADARR_URL" \
        --build-arg VITE_LIDARR_URL="$VITE_LIDARR_URL" \
        --build-arg VITE_PROWLARR_URL="$VITE_PROWLARR_URL" \
        --build-arg VITE_TAUTULLI_URL="$VITE_TAUTULLI_URL" \
        --build-arg VITE_SEERR_URL="$VITE_SEERR_URL" \
        --build-arg VITE_PIHOLE_URL="$VITE_PIHOLE_URL" \
        --build-arg VITE_PIHOLE_KEY="$VITE_PIHOLE_KEY" \
        --build-arg VITE_SPEEDTEST_URL="$VITE_SPEEDTEST_URL" \
        --build-arg VITE_AUDIOBOOKSHELF_URL="$VITE_AUDIOBOOKSHELF_URL" \
        --build-arg VITE_QBITTORRENT_URL="$VITE_QBITTORRENT_URL" \
        --build-arg VITE_GLANCES_URL="$VITE_GLANCES_URL" \
        --build-arg VITE_BESZEL_URL="$VITE_BESZEL_URL" \
        --build-arg VITE_NEXTCLOUD_URL="$VITE_NEXTCLOUD_URL" \
        --build-arg HOMEY_ID="$HOMEY_ID" \
        -t "$TAG_SHA" -t "$TAG_REF" $EXTRA_TAG \
        -f docker/Dockerfile \
        .
      docker push --all-tags "$CI_REGISTRY_IMAGE"
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
