# ─────────────────────────────────────────────────────────────
#  GitHub Actions — build & push Docker image to GHCR
#
#  Image tags pushed:
#    ghcr.io/<owner>/homedashboard:<short-sha>   (every build)
#    ghcr.io/<owner>/homedashboard:<branch>      (slug)
#    ghcr.io/<owner>/homedashboard:latest        (default branch only)
#
#  Build-time public vars (VITE_*_URL) come from repo secrets —
#  set them in: Settings → Secrets and variables → Actions.
#
#  Runtime secrets (TRUENAS_API_KEY, PLEX_TOKEN, …) are NOT baked
#  into the image. Inject them on the NAS via compose env_file.
# ─────────────────────────────────────────────────────────────

name: build

on:
  push:
    branches: ["**"]
    tags: ["**"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/homedashboard" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_TRUENAS_URL=${{ secrets.VITE_TRUENAS_URL }}
            VITE_PLEX_URL=${{ secrets.VITE_PLEX_URL }}
            VITE_SONARR_URL=${{ secrets.VITE_SONARR_URL }}
            VITE_RADARR_URL=${{ secrets.VITE_RADARR_URL }}
            VITE_LIDARR_URL=${{ secrets.VITE_LIDARR_URL }}
            VITE_PROWLARR_URL=${{ secrets.VITE_PROWLARR_URL }}
            VITE_TAUTULLI_URL=${{ secrets.VITE_TAUTULLI_URL }}
            VITE_SEERR_URL=${{ secrets.VITE_SEERR_URL }}
            VITE_PIHOLE_URL=${{ secrets.VITE_PIHOLE_URL }}
            VITE_PIHOLE_KEY=${{ secrets.VITE_PIHOLE_KEY }}
            VITE_SPEEDTEST_URL=${{ secrets.VITE_SPEEDTEST_URL }}
            VITE_AUDIOBOOKSHELF_URL=${{ secrets.VITE_AUDIOBOOKSHELF_URL }}
            VITE_QBITTORRENT_URL=${{ secrets.VITE_QBITTORRENT_URL }}
            VITE_QUI_URL=${{ secrets.VITE_QUI_URL }}
            VITE_GLANCES_URL=${{ secrets.VITE_GLANCES_URL }}
            VITE_BESZEL_URL=${{ secrets.VITE_BESZEL_URL }}
            VITE_NEXTCLOUD_URL=${{ secrets.VITE_NEXTCLOUD_URL }}
            VITE_ARCANE_URL=${{ secrets.VITE_ARCANE_URL }}
            VITE_TUGTAINER_URL=${{ secrets.VITE_TUGTAINER_URL }}
            VITE_NPM_URL=${{ secrets.VITE_NPM_URL }}
            VITE_ASUS_URL=${{ secrets.VITE_ASUS_URL }}
            HOMEY_ID=${{ secrets.HOMEY_ID }}

  deploy:
    needs: build
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Arcane redeploy
        env:
          ARCANE_WEBHOOK_URL: ${{ secrets.ARCANE_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          : "${ARCANE_WEBHOOK_URL:?missing}"
          curl --fail --show-error --silent -X POST "$ARCANE_WEBHOOK_URL"
